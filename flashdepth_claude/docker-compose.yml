version: '3.8'

services:
  flashdepth:
    build: .
    image: flashdepth:latest
    container_name: flashdepth_training
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1,2
      - CUDA_VISIBLE_DEVICES=0,1,2
      - PYTHONPATH=/app
      - TRITON_CACHE_DIR=/app/.triton_cache
      - TRITON_PRINT_AUTOTUNING=1
    volumes:
      # Mount datasets directory
      - /home/cvlab/hsy/Datasets:/data/datasets:ro
      # Mount results directory (bidirectional for reading/writing)
      - ./train_results:/app/train_results
      # Mount configs for easy modification
      - ./configs:/app/configs
      # Mount source code for development (optional)
      - ./flashdepth:/app/flashdepth
      - ./dataloaders:/app/dataloaders
      - ./utils:/app/utils
      # Mount the updated train_metric_head.py
      - ./train_metric_head.py:/app/train_metric_head.py
    working_dir: /app
    stdin_open: true
    tty: true
    shm_size: '2gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1', '2']
              capabilities: [gpu]

    # Override default command for interactive development
    # Uncomment the line below to start container in interactive mode
    # command: /bin/bash

    # Default: run train_metric_head.py with TartanAir dataset (Stage 1: FlashDepth-L)
    command: >
      python train_metric_head.py
      --config-path configs/flashdepth-l
      dataset.data_root=/data/datasets
      dataset.train_datasets=[tartanair]
      dataset.val_datasets=[tartanair]
      training.batch_size=4
      training.workers=10
      results_dir=train_results/results_1