# Gear3 Upgrade Ablation Study - Multi-layer CLS without FG/BG Separation
# Purpose: Evaluate contribution of multi-layer features vs FG/BG separation
#
# Comparison:
#   - Gear2: Single-layer CLS, no separation (baseline)
#   - This: Multi-layer CLS, no separation (tests multi-layer benefit alone)
#   - Gear3 Upgrade multi_layer: Multi-layer attention + FG/BG separation (full model)

# General settings
config_dir: null # overwrite by --config-path
inference: false
load: configs/flashdepth-l/iter_10001.pth  # FlashDepth-L pretrained weights
phase: 1  # Training phase (1, 2, or 3)

# Canonical space settings
canonical_focal_length: 1000.0
use_canonical_space: true  # ENABLED - all training data normalized to canonical focal length

# ========== Ablation Study: Multi-layer CLS without FG/BG Separation ==========
# This ablation uses 'multi_layer_no_sep':
#   - Extracts CLS tokens from layers 4, 11, 17, 23 (like multi_layer)
#   - NO FG/BG separation (uniform modulation like Gear2)
separation_method: 'multi_layer_no_sep'  # Ablation method

# Dataset configuration
dataset:
  data_root: null # change data path
  resolution: 'base'  # 518x518
  video_length: 5
  train_datasets: [mvs-synth, dynamicreplica, tartanair, pointodyssey, spring]
  val_datasets: [sintel, waymo]

# Training configuration
training:
  batch_size: 20  # Per GPU (effective 40 with 2 GPUs in DDP)
  workers: 8      # Optimized for 96 CPU cores
  iterations: 40001
  save_freq: 5000
  val_freq: 1000  # Validation every 1k steps
  log_freq: 100
  wandb: false
  wandb_name: "gear3_upgrade_ablation_multi_layer_no_sep_phase1"

  # Learning rates
  gear3_lr: 1.0e-4  # For Gear3 Upgrade Ablation modules
  mamba_lr: 1.0e-4  # For Mamba (train from scratch)
  weight_decay: 1.0e-6

  # FPS measurement
  measure_fps: true
  fps_log_freq: 100

# Model configuration
model:
  # ViT configuration
  vit_size: "vitl"
  patch_size: 14
  attn_class: "MemEffAttention"

  # Mamba configuration
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [1]
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false

# Hybrid model (not used)
hybrid_configs:
  use_hybrid: false

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_gear3_ablation"
  test_datasets: [sintel]
  test_dataset_resolution: 'base'
  random_input: null
  out_video: true
  out_mp4: false
  save_res: 518
  video_fps: 24
  gif_duration: 110
  save_depth_npy: false
  save_vis_map: false
  dummy_timing: false

# Object-wise evaluation configuration
object_wise:
  enabled: false  # Enable object-wise evaluation (set via CLI: object_wise.enabled=true)
  dataset: waymo  # Dataset type for object-wise eval: waymo, sintel
