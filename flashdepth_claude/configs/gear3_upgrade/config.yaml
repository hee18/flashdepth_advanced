# Gear3 Upgrade Configuration - Enhanced FG/BG Separation
# Phase 1: Train on 5 datasets (518×518)
# Phase 2: Train on mvs-synth, spring (2K resolution)
# Phase 3: Fine-tune on nuScenes (2K resolution)

# General settings
config_dir: null # overwrite by --config-path
inference: false
load: configs/flashdepth-l/iter_10001.pth  # FlashDepth-L pretrained weights
phase: 1  # Training phase (1, 2, or 3)

# Canonical space settings
canonical_focal_length: 1000.0  # Fixed canonical focal length for all resolutions
use_canonical_space: true  # ENABLED - all training data normalized to canonical focal length

# ========== Gear3 Upgrade Specific: FG/BG Separation Method ==========
# Choose ONE of the following methods:
#   'cls_seg': CLS-based light segmentation (~1-2ms overhead)
#   'kmeans': Differentiable K-means clustering (~5-10ms overhead)
#   'multi_layer': Multi-layer attention fusion (~3ms overhead)
separation_method: 'cls_seg'  # DEFAULT: CLS-based segmentation

# Dataset configuration
dataset:
  data_root: null # change data path
  resolution: 'base'  # 518x518
  video_length: 5
  train_datasets: [mvs-synth, dynamicreplica, tartanair, pointodyssey, spring]
  val_datasets: [sintel, waymo_seg]

# Training configuration
training:
  batch_size: 20  # Per GPU (effective 40 with 2 GPUs in DDP)
  workers: 8      # Optimized for 96 CPU cores
  iterations: 40001
  save_freq: 5000
  val_freq: 1000  # Validation every 1k steps
  log_freq: 100
  wandb: false
  wandb_name: "gear3_upgrade_cls_seg_phase1"  # Update based on separation_method

  # Learning rates
  gear3_lr: 1.0e-4  # For new Gear3 Upgrade modules
  mamba_lr: 1.0e-4  # For Mamba (train from scratch)
  weight_decay: 1.0e-6

  # FPS measurement
  measure_fps: true
  fps_log_freq: 100

# Model configuration
model:
  # ViT configuration
  vit_size: "vitl"
  patch_size: 14
  attn_class: "MemEffAttention"

  # Mamba configuration
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [1]
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false

# Hybrid model (not used)
hybrid_configs:
  use_hybrid: false

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_gear3_upgrade"
  test_datasets: [sintel]
  test_dataset_resolution: 'base'
  random_input: null
  out_video: true
  out_mp4: false
  save_res: 518
  video_fps: 24
  gif_duration: 110
  save_depth_npy: false
  save_vis_map: false
  dummy_timing: false

# Object-wise evaluation configuration
object_wise:
  enabled: false  # Enable object-wise evaluation (set via CLI: object_wise.enabled=true)
  dataset: waymo_seg  # Dataset type for object-wise eval: waymo_seg, sintel
