# Gear5 Hybrid Configuration - Phase 2 (2K Resolution with ViT-S)
# Step 1: Global Scale & Shift Prediction from multi-layer CLS tokens (2K, ViT-S)
# Step 2: Foreground-only modulation on globally-modulated features (2K, ViT-S)
#
# Architecture:
# - DINOv2 ViT-S + ViT-L Hybrid Fusion (from FlashDepth-hybrid)
# - DPT with Mamba temporal modeling
# - Gear5 Metric Head: GSP (Step 1) + FFM (Step 2)
#
# Training pipeline:
# Phase2 Step1: Load GSP+Mamba+output from Phase1 Step2, overwrite DINOv2+DPT from FlashDepth-hybrid
# Phase2 Step2: Load from Phase2 Step1, add FFM from Phase1 Step2

# General settings
config_dir: null # overwrite by --config-path
inference: false
load: configs/flashdepth/iter_43002.pth  # FlashDepth-hybrid checkpoint (DINOv2 ViT-L+S + DPT)
gear_checkpoint: null  # Phase1 Step2 checkpoint (for Phase2 Step1) or Phase2 Step1 checkpoint (for Phase2 Step2)
phase1_step2_checkpoint: null  # Phase1 Step2 checkpoint (for loading FFM in Phase2 Step2)
step: 1  # Training step (1 or 2)

# Canonical space settings
canonical_focal_length: 500.0  # Fixed canonical focal length for all resolutions
use_canonical_space: true  # ENABLED - all training data normalized to canonical focal length

# ========== Gear5 Specific Settings ==========
# Step 1: Uses multi-layer CLS tokens [2, 5, 8, 11] (ViT-S) for global GSP
# Step 2: Uses multi-layer attention [2, 5, 8, 11] (ViT-S) for FG mask generation
# No separation_method config needed (hardcoded to multi_layer architecture)

# Dataset configuration (2K resolution)
dataset:
  data_root: null # change data path
  resolution: '2k'  # 2K resolution for Phase 2
  video_length: 5
  train_datasets: [mvs-synth, spring]  # 2K datasets
  val_datasets: [sintel, waymo_seg]

# Training configuration
training:
  batch_size: 3   # Per GPU (reduced for 2K resolution with gradient checkpointing)
  workers: 8      # Optimized for data loading
  iterations: 40001
  save_freq: 5000
  val_freq: 1000  # Validation every 1k steps
  log_freq: 100
  gradient_checkpointing: true  # CRITICAL for 2K resolution (saves ~50% memory)
  wandb: false
  wandb_name: "gear5_hybrid_step1"  # Update to gear5_hybrid_step2 for Step 2

  # Learning rates (step-specific, similar to Phase 1 but can be adjusted)
  # Step 1: GSP (1e-4) + Mamba (1e-4) + Final (1e-4)
  # Step 2: FG modulation (1e-4) + Mamba (5e-5, lower) + Final (5e-5)
  gsp_lr: 1.0e-4      # Step 1: Global GSP learning rate
  fg_mod_lr: 1.0e-4   # Step 2: FG modulation learning rate
  mamba_lr: 1.0e-4    # Step 1: Mamba LR; Step 2: 5e-5 (lower for fine-tuning)
  output_lr: 1.0e-4   # Step 1: Output head LR; Step 2: 5e-5
  weight_decay: 1.0e-6

  # FPS measurement
  measure_fps: true
  fps_log_freq: 100

# Model configuration (ViT-S for Phase 2)
model:
  # ViT configuration (ViT-S for 2K hybrid)
  vit_size: "vits"
  patch_size: 14
  attn_class: "MemEffAttention"

  # Mamba configuration
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [1]
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false

# Hybrid model (ENABLED for Phase 2)
hybrid_configs:
  use_hybrid: true
  teacher_model_path: null  # ViT-L teacher (handled internally by FlashDepth-hybrid)
  teacher_resolution: 490
  layers_to_skip: [1, 2, 3]  # Only path_4 (index 0) used for fusion
  num_blocks: 4
  mlp_expand: 2
  num_heads: 2

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_gear5_hybrid"
  test_datasets: [sintel, waymo_seg, eth3d, urbansyn, unreal4k]  # All test datasets (not used in training)
  test_dataset_resolution: '2k'
  random_input: null
  out_video: true
  out_mp4: false
  save_res: 518
  video_fps: 24
  gif_duration: 110
  save_depth_npy: false
  save_vis_map: false  # Set true to save importance maps and FG masks
  dummy_timing: false

# Object-wise evaluation configuration
object_wise:
  enabled: false  # Enable object-wise evaluation (set via CLI: object_wise.enabled=true)
  dataset: waymo_seg  # Dataset type for object-wise eval: waymo_seg, sintel
