# Gear5 Configuration - ViT-L variant
# Single-Stage: GRU predicts frame-wise scale & shift from 2-layer CLS tokens
# Architecture: Frozen FlashDepth pipeline + Trainable Gear5MetricHead (~132K params)
# Formula: D_metric = Scale × D_relative + Shift

# General settings
config_variant: l  # Required for train_gear5.py phase detection
config_dir: null # overwrite by --config-path
inference: false
load: configs/flashdepth-l/iter_10001.pth  # FlashDepth-L pretrained weights (ViT + DPT + Mamba + output_conv)

# Canonical space settings
canonical_focal_length: 500.0  # Fixed canonical focal length for all resolutions
use_canonical_space: true  # ENABLED - all training data normalized to canonical focal length

# Loss configuration
loss_type: log_l1  # Loss type: log_l1 (default), importance (importance-weighted)

# ========== Gear5 Specific Settings ==========
# Unified Architecture:
#   - 2-layer CLS tokens [11, 23] for ViT-L or [5, 11] for ViT-S (averaged)
#   - 2-layer attention weights for importance map generation
#   - GRU temporal modeling for smooth scale/shift predictions
#   - Importance-weighted Log L1 loss: L = |log(pred_inv) - log(gt_inv)| × (1 + α × importance)
# Frozen: ViT encoder, DPT decoder, Mamba, output_conv (~340M params)
# Trainable: TemporalScalePredictor (~132K params, 0.04% of total)

# Dataset configuration
dataset:
  data_root: null # change data path
  resolution: 'base'  # 518x518
  video_length: 5
  train_datasets: [mvs-synth, dynamicreplica, tartanair, pointodyssey, spring]
  val_datasets: [sintel, waymo_seg]

# Training configuration
training:
  batch_size: 20  # Per GPU (effective 40 with 2 GPUs in DDP)
  workers: 8      # Optimized for 96 CPU cores
  iterations: 40001
  save_freq: 5000
  val_freq: 1000  # Validation every 1k steps
  log_freq: 100
  wandb: false
  wandb_name: "gear5_l_phase1"

  # Learning rates (unified single-stage training)
  # Only Gear5MetricHead is trainable, all other components frozen
  gear5_lr: 1.0e-4    # Temporal scale predictor learning rate
  weight_decay: 1.0e-6

  # FPS measurement
  measure_fps: true
  fps_log_freq: 100

# Model configuration
model:
  # ViT configuration
  vit_size: "vitl"
  patch_size: 14
  attn_class: "MemEffAttention"

  # Gear5 attention layer selection (2-layer CLS tokens)
  target_blocks: [11, 23]  # ViT-L: layers 11, 23 (for Phase 1)
  target_blocks_s: [5, 11]  # ViT-S: layers 5, 11 (for Phase 2 hybrid)

  # Gear5 Temporal Modeling Backend (NEW: Support Mamba2 option)
  # NOTE: This controls ONLY the TemporalScalePredictor module!
  # The original FlashDepth Mamba modules (below) are ALWAYS frozen during Gear5 training.
  use_mamba_temporal: false  # false=GRU (fast for T<50), true=Mamba2 (better for T>100)

  # TSP (Temporal Scale Predictor) embed_dim mode
  # Options: "auto" (default), "l" (1024-dim), "s" (384-dim)
  tsp_mode: "auto"

  # FlashDepth Mamba configuration (FROZEN during Gear5 training)
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [3]  # ViT-L uses path_1 (layer 3) - same as original FlashDepth-L
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false

# Hybrid model (not used)
hybrid_configs:
  use_hybrid: false

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_gear5_l"
  test_datasets: [sintel, waymo_seg, eth3d, urbansyn, unreal4k, bonn]  # All test datasets (not used in training)
  test_dataset_resolution: 'base'
  random_input: null
  out_video: true
  out_mp4: false
  save_res: 518
  video_fps: 24
  gif_duration: 110
  save_depth_npy: false
  save_vis_map: false  # Set true to save importance maps and FG masks
  dummy_timing: false

# Object-wise evaluation configuration
object_wise:
  enabled: false  # Enable object-wise evaluation (set via CLI: object_wise.enabled=true)
  dataset: waymo_seg  # Dataset type for object-wise eval: waymo_seg, sintel

# ========== BANKAI MODE ==========
# Unified Mamba for temporal depth enhancement + metric scale/shift prediction
# Replaces both FlashDepth Mamba (F-Mamba) and Gear5's TemporalScalePredictor (T-Mamba)
# Reference: Gear5_bankai.md for architecture details

# Enable Bankai mode (default: false for backward compatibility)
use_bankai: false

# Bankai training phase (Head-First Tuning):
#   bankai_phase=1: Train Metric Head only (scale/shift MLPs) - ~0.5M params
#   bankai_phase=2: Train UnifiedMamba + Metric Head + output_conv - ~1.8M params
bankai_phase: 1

# TGM Loss weight (Temporal Gradient Matching from Video Depth Anything)
# L_total = L_depth + tgm_weight × L_TGM
# Set to 0 to disable TGM loss (standard Log L1 only)
tgm_weight: 0.3

# Bankai architecture settings
bankai_downsample: 0.1  # Large: 0.1 (148→14), Small/Hybrid: 0.05 (148→7)
bankai_num_mamba_layers: 4  # Number of Mamba2 layers in UnifiedMamba

# CLS layers for Bankai (uses 3rd and 4th intermediate layers)
# ViT-L: [17, 23], ViT-S: [8, 11]
# Default [3, 4] maps to these block indices via intermediate_layer_idx
cls_layers: [3, 4]
