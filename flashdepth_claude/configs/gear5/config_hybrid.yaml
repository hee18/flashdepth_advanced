# Gear5 Hybrid Configuration - Phase 2 (2K Resolution with ViT-S)
# Unified Single-Stage Training: Temporal Scale Prediction
#
# Architecture:
# - DINOv2 ViT-S + ViT-L Hybrid Fusion (from FlashDepth-hybrid)
# - DPT with Mamba temporal modeling (frozen)
# - Gear5 Metric Head: 2-layer CLS tokens + GRU/Mamba2 temporal modeling
#
# Training pipeline:
# Phase 2: Load Gear5 Phase 1 checkpoint (Gear5MetricHead + Mamba + output_conv)
#          Overwrite ViT + DPT with FlashDepth-hybrid checkpoint
# Freezing: ViT + DPT + Mamba + output_conv
# Trainable: Only Gear5MetricHead (~132K params)

# General settings
config_variant: hybrid  # Required for train_gear5.py phase detection
config_dir: null # overwrite by --config-path
inference: false
load: configs/flashdepth/iter_43002.pth  # FlashDepth-hybrid checkpoint (DINOv2 ViT-L+S + DPT)
gear_checkpoint: null  # Phase 1 Gear5 Small checkpoint (for Phase 2) - must be Small!

# Canonical space settings
canonical_focal_length: 500.0  # Fixed canonical focal length for all resolutions
use_canonical_space: true  # ENABLED - all training data normalized to canonical focal length

# Loss configuration
loss_type: log_l1  # Loss type: log_l1 (default), importance (importance-weighted)

# ========== Gear5 Specific Settings ==========
# Unified Single-Stage:
# - Uses 2-layer CLS tokens: [5, 11] for ViT-S or [11, 23] for ViT-L
# - GRU/Mamba2 temporal modeling for scale/shift prediction
# - Attention-based importance map from 2 layers

# Dataset configuration (2K resolution)
dataset:
  data_root: null # change data path
  resolution: '2k'  # 2K resolution for Phase 2
  video_length: 5
  train_datasets: [mvs-synth, spring]  # 2K datasets
  val_datasets: [sintel, waymo_seg]

# Training configuration
training:
  batch_size: 3   # Per GPU (reduced for 2K resolution with gradient checkpointing)
  workers: 8      # Optimized for data loading
  iterations: 40001
  save_freq: 5000
  val_freq: 1000  # Validation every 1k steps
  log_freq: 100
  gradient_checkpointing: true  # CRITICAL for 2K resolution (saves ~50% memory)
  wandb: false
  wandb_name: "gear5_hybrid"

  # Learning rate (unified single-stage)
  gear3_lr: 1.0e-4    # Gear5MetricHead learning rate (same for all trainable params)
  weight_decay: 1.0e-6

  # FPS measurement
  measure_fps: true
  fps_log_freq: 100

# Model configuration (ViT-S for Phase 2)
model:
  # ViT configuration (ViT-S for 2K hybrid)
  vit_size: "vits"
  patch_size: 14
  attn_class: "MemEffAttention"

  # Gear5 2-layer architecture (for CLS tokens and attention weights)
  # ViT-S: [5, 11], ViT-L: [11, 23]
  target_blocks: [5, 11]  # 2-layer blocks for ViT-S

  # Gear5 Temporal Modeling Backend (NEW: Support Mamba2 option)
  # NOTE: This controls ONLY the TemporalScalePredictor module!
  # The original FlashDepth Mamba modules (below) are ALWAYS frozen during Gear5 training.
  use_mamba_temporal: false  # false=GRU (fast for T<50), true=Mamba2 (better for T>100)

  # TSP (Temporal Scale Predictor) embed_dim mode
  # Options: "auto" (default), "l" (1024-dim), "s" (384-dim)
  tsp_mode: "auto"

  # FlashDepth Mamba configuration (FROZEN during Gear5 training)
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [1]  # Hybrid uses path_3 (layer 1) - same as original FlashDepth Hybrid
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false

# Hybrid model (ENABLED for Phase 2)
hybrid_configs:
  use_hybrid: true
  teacher_model_path: null  # ViT-L teacher (handled internally by FlashDepth-hybrid)
  teacher_resolution: 490
  layers_to_skip: [1, 2, 3]  # Only path_4 (index 0) used for fusion
  num_blocks: 4
  mlp_expand: 2
  num_heads: 2

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_gear5_hybrid"
  test_datasets: [sintel, waymo_seg, eth3d, urbansyn, unreal4k, bonn]  # All test datasets (not used in training)
  test_dataset_resolution: '2k'
  random_input: null
  out_video: true
  out_mp4: false
  save_res: 518
  video_fps: 24
  gif_duration: 110
  save_depth_npy: false
  save_vis_map: false  # Set true to save importance maps and FG masks
  dummy_timing: false

# Object-wise evaluation configuration
object_wise:
  enabled: false  # Enable object-wise evaluation (set via CLI: object_wise.enabled=true)
  dataset: waymo_seg  # Dataset type for object-wise eval: waymo_seg, sintel

# FG-wise (foreground-wise) evaluation configuration
# Uses ViT attention-based fg_masks to evaluate depth accuracy separately for FG/BG regions
fg_wise:
  enabled: false  # Enable FG-wise evaluation (set via CLI: fg_wise.enabled=true)
