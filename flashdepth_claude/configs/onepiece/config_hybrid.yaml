# Onepiece V3 Configuration - Hybrid variant (ViT-S student + ViT-L teacher)
# Spatial Mamba + Hybrid Fusion for metric depth estimation
# Student: ViT-S (dpt_dim=64), Teacher: ViT-L (CLS + path_4 fusion)
# CLS source: Teacher ViT-L (embed_dim=1024) → projected to dpt_dim=64

# General Settings
config_variant: hybrid
config_dir: null
inference: false
load: configs/flashdepth/iter_43002.pth  # FlashDepth-hybrid checkpoint (ViT-S+L + DPT + fusion)
train_mode: metric               # "metric" or "inverse"

# Dataset Configuration
dataset:
  data_root: null
  resolution: '2k'          # 2K resolution (hybrid second stage)
  video_length: 5            # 5 frames for temporal processing
  train_datasets: [mvs-synth, spring]
  val_datasets: [sintel, waymo_seg]

# Training Configuration
training:
  batch_size: 3              # Per GPU (hybrid requires more memory due to teacher)
  workers: 8
  gradient_checkpointing: true
  save_freq: 5000
  val_freq: 1000
  vis_freq: 250
  total_iters: 40001
  iterations: 40001
  gradient_accumulation: 1
  wandb: false
  wandb_name: "onepiece_v3_hybrid"
  start_with_val: false
  weight_decay: 1.0e-6
  lr:
    onepiece: 1.0e-4          # SpatialMamba + CLSMetricHead + CLS projection
    dpt: 1.0e-5               # 1/10 of onepiece (Phase 2)
    fusion: 1.0e-4            # HybridFusion (Phase 2)
    warmup_steps: 500

# Model Configuration
model:
  vit_size: "vits"            # Student: ViT-S
  patch_size: 14
  attn_class: "MemEffAttention"
  use_mamba: false             # No FlashDepth Mamba (Onepiece has its own SpatialMamba)
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false
  # Onepiece V3 Spatial Mamba config (dpt_dim=64 → auto expand=4, headdim=32)
  use_onepiece: true
  spatial_mamba_layers: 4
  spatial_mamba_d_state: 256
  spatial_mamba_d_conv: 4
  spatial_mamba_downsample: 0.1

# Hybrid Model Configuration (ENABLED - ViT-L teacher for fusion + CLS)
hybrid_configs:
  use_hybrid: true
  teacher_model_path: null     # Teacher weights loaded from main checkpoint
  teacher_resolution: 490
  layers_to_skip: [1, 2, 3]   # Only path_4 (index 0) used for fusion
  num_blocks: 4
  mlp_expand: 2
  num_heads: 2

# Loss Configuration
loss:
  log_l1_weight: 1.0
  tgm_weight: 1.0
  ofc_weight: 0.01
  use_log_space: true

# Scene Cut Detection (inference only)
scene_cut:
  tau: 0.15
  k: 80

# Phase Transition
phase:
  auto_transition_step: 1500
  phase2_warmup_steps: 500

# Evaluation Configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_onepiece_hybrid"
  test_datasets: [sintel, waymo_seg, eth3d, urbansyn, unreal4k, bonn]
  test_dataset_resolution: 'base'
  random_input: null
  out_video: true
  out_mp4: false
  save_res: 518
  save_depth_npy: false
  save_vis_map: false
  dummy_timing: false
  large_dir: null
  first_seq_only: false

# Flow Estimation
flow:
  model: "sea_raft"
  checkpoint: "third_party/SEA-RAFT/models/Tartan-C-T-TSKH-spring540x960-M.pth"
