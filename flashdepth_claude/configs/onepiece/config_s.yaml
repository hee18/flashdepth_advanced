# Onepiece V3 Configuration - ViT-S variant
# Spatial Mamba + Dual-Stream Architecture for metric depth estimation
# ViT-S: dpt_dim=64, SpatialMamba uses expand=4, headdim=32 (auto-detected)

# General Settings
config_variant: s
config_dir: null
inference: false
load: configs/flashdepth-s/iter_14001.pth
train_mode: metric               # "metric" or "inverse"
use_dual_cstm: true              # false → No Dual-CSTM ablation (use --no-cstm flag)

# Dataset Configuration
dataset:
  data_root: null
  resolution: 'base'        # 518x518
  video_length: 8            # 8 frames for temporal processing
  train_datasets: [mvs-synth, dynamicreplica, tartanair, pointodyssey, spring]
  val_datasets: [sintel, waymo_seg]

# Training Configuration
training:
  batch_size: 8              # Per GPU (smaller model allows larger batch)
  workers: 8
  gradient_checkpointing: true
  save_freq: 5000
  val_freq: 1000
  vis_freq: 250
  total_iters: 40001
  iterations: 40001
  gradient_accumulation: 1
  wandb: false
  wandb_name: "onepiece_v3_s"
  start_with_val: false
  weight_decay: 1.0e-6
  lr:
    onepiece: 1.0e-4          # SpatialMamba + ConvMetricHead
    dpt: 1.0e-5               # 1/10 of onepiece (Phase 2)
    warmup_steps: 500

# Model Configuration
model:
  vit_size: "vits"
  patch_size: 14
  attn_class: "MemEffAttention"
  use_mamba: false             # No FlashDepth Mamba
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false
  # Onepiece V3 Spatial Mamba config
  use_onepiece: true
  spatial_mamba_layers: 4
  spatial_mamba_d_state: 256
  spatial_mamba_d_conv: 4
  spatial_mamba_downsample: 0.1
  use_teacher_cls: true          # true=teacher ViT-L CLS (hybrid only), false=student CLS (--student-cls)

# Hybrid Model Configuration
hybrid_configs:
  use_hybrid: false
  teacher_model_path: null
  teacher_resolution: 490
  layers_to_skip: [1,2,3]
  num_blocks: 4
  mlp_expand: 2
  num_heads: 2

# Loss Configuration
loss:
  log_l1_weight: 1.0
  tgm_weight: 1.0
  ofc_weight: 0.01
  use_log_space: true

# Scene Cut Detection (inference only)
scene_cut:
  tau: 0.15
  k: 80

# Phase Transition
phase:
  auto_transition_step: 1500
  phase2_warmup_steps: 500

# Evaluation Configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_onepiece_s"
  test_datasets: [sintel, waymo_seg, eth3d, urbansyn, unreal4k, bonn]
  test_dataset_resolution: 'base'
  random_input: null
  out_video: true
  out_mp4: false
  save_res: 518
  save_depth_npy: false
  save_vis_map: false
  dummy_timing: false
  large_dir: null
  first_seq_only: false

# Flow Estimation
flow:
  model: "sea_raft"
  checkpoint: "third_party/SEA-RAFT/models/Tartan-C-T-TSKH-spring540x960-M.pth"
