# Onepiece V3 — FSDP2 Hybrid Config (ViT-S student + ViT-L teacher, 2K)
# Use with train_onepiece_fsdp.py
#   torchrun --nproc_per_node=2 train_onepiece_fsdp.py \
#     --config-path configs/onepiece --config-name config_hybrid_fsdp \
#     dataset.data_root=/data/datasets \
#     results_dir=train_results/results_fsdp_hybrid_01

# General Settings
config_variant: hybrid_fsdp
config_dir: null
inference: false
load: null          # Student checkpoint: Onepiece-S best.pth (pretrained.* + depth_head.* loaded, onepiece modules excluded)
load_teacher: null  # Teacher checkpoint: Onepiece-L best.pth (pretrained.* + depth_head.* remapped to teacher_model.*)
                    # Both should be Onepiece single-backbone checkpoints, NOT FlashDepth hybrid.
resume: null        # Set to path to resume from a previously saved FSDP checkpoint
train_mode: metric

# Dataset Configuration
dataset:
  data_root: null
  resolution: '2k'
  video_length: 5
  train_datasets: [mvs-synth, spring]
  val_datasets: [sintel, waymo_seg]

# Training Configuration
training:
  batch_size: 1              # Per GPU at 2K (increase to 2 if memory allows)
  workers: 8
  gradient_checkpointing: true
  save_freq: 5000
  val_freq: 1000
  vis_freq: 250
  total_iters: 40001
  iterations: 40001
  gradient_accumulation: 1
  wandb: false
  wandb_name: "onepiece_v3_hybrid_fsdp"
  start_with_val: false
  weight_decay: 1.0e-6
  lr:
    onepiece: 1.0e-4
    dpt: 1.0e-5
    fusion: 1.0e-4
    warmup_steps: 500

# Model Configuration
model:
  vit_size: "vits"
  patch_size: 14
  attn_class: "MemEffAttention"
  use_mamba: false
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false
  use_onepiece: true
  spatial_mamba_layers: 4
  spatial_mamba_d_state: 256
  spatial_mamba_d_conv: 4
  spatial_mamba_downsample: 0.1

# Hybrid Model Configuration
hybrid_configs:
  use_hybrid: true
  teacher_model_path: null
  teacher_resolution: 490
  layers_to_skip: [1, 2, 3]
  num_blocks: 4
  mlp_expand: 2
  num_heads: 2

# FSDP2 Configuration
fsdp:
  cpu_offload: false
  # Student ViT blocks: keep unsharded during T-frame loop for speed
  reshard_after_forward_student: false
  # Teacher ViT blocks (frozen): reshard immediately to save peak GPU memory
  reshard_after_forward_teacher: true

# Loss Configuration
loss:
  log_l1_weight: 1.0
  tgm_weight: 1.0
  ofc_weight: 0.01
  use_log_space: true

# Scene Cut Detection (inference only)
scene_cut:
  tau: 0.15
  k: 80

# Phase Transition
phase:
  auto_transition_step: 1500
  phase2_warmup_steps: 500

# Evaluation Configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_onepiece_hybrid_fsdp"
  test_datasets: [sintel, waymo_seg, eth3d, urbansyn, unreal4k, bonn]
  test_dataset_resolution: 'base'
  random_input: null
  out_video: true
  out_mp4: false
  save_res: 518
  save_depth_npy: false
  save_vis_map: false
  dummy_timing: false
  large_dir: null
  first_seq_only: false

# Flow Estimation
flow:
  model: "sea_raft"
  checkpoint: "third_party/SEA-RAFT/models/Tartan-C-T-TSKH-spring540x960-M.pth"
