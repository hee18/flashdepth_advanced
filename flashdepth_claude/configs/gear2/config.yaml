# Gear2 Configuration - Ablation Study (No FG/BG Separation)
# Phase 1: Train on 5 datasets (518×518)
# Phase 2: Train on mvs-synth, spring (2K resolution)
# Phase 3: Fine-tune on nuScenes (2K resolution)

# General settings
config_dir: null # overwrite by --config-path
inference: false
load: configs/flashdepth-l/iter_10001.pth  # FlashDepth-L pretrained weights
phase: 1  # Training phase (1 or 2)

# Canonical space settings
canonical_focal_length: 1000.0  # Fixed canonical focal length for all resolutions
use_canonical_space: true  # ENABLED - all training data normalized to canonical focal length

# Dataset configuration
dataset:
  data_root: null # change data path
  resolution: 'base'  # 518x518
  video_length: 5
  train_datasets: [mvs-synth, dynamicreplica, tartanair, pointodyssey, spring]
  val_datasets: [sintel, waymo_seg]

# Training configuration
training:
  batch_size: 20  # Per GPU (effective 40 with 2 GPUs in DDP) - optimized based on GPU memory
  workers: 8      # Optimized for 96 CPU cores
  iterations: 40001  # Reduced from 60001 (best model at step 2k, overfitting after)
  save_freq: 5000
  val_freq: 1000  # Validation every 1k steps
  log_freq: 100
  wandb: false
  wandb_name: "gear2_phase1"

  # Learning rates (Gear2 specific)
  gear2_lr: 1.0e-4  # For new Gear2 modules (same as Gear3)
  mamba_lr: 1.0e-4  # For Mamba (train from scratch, same LR as gear2)
  weight_decay: 1.0e-6

  # Regularization losses - NOT APPLICABLE FOR GEAR2 (no importance map)
  use_depth_variance_loss: false  # N/A for Gear2
  depth_variance_loss_weight: 0.5  # N/A
  variance_kernel_size: 15  # N/A
  variance_sigma: 3.0  # N/A

  use_edge_aware_loss: false  # N/A for Gear2
  edge_aware_loss_weight: 0.3  # N/A

  use_contrastive_fgbg_loss: false  # N/A for Gear2
  contrastive_fgbg_loss_weight: 0.3  # N/A

  # FPS measurement
  measure_fps: true  # Measure forward pass FPS (inference speed)
  fps_log_freq: 100  # Log FPS every N steps

# Model configuration (same as FlashDepth-L)
model:
  # ViT configuration
  vit_size: "vitl"
  patch_size: 14
  attn_class: "MemEffAttention"

  # Mamba configuration
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [1]  # Mamba at DPT layer 1
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false

# Hybrid model (not used in Gear2)
hybrid_configs:
  use_hybrid: false

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_gear2"
  test_datasets: [sintel]
  test_dataset_resolution: 'base'
  random_input: null
  out_video: true  # Enable video/GIF saving
  out_mp4: false   # false=GIF, true=MP4 (MP4 encoder not available, use GIF)
  save_res: 518    # Video height (original resolution, matches test resolution)
  video_fps: 24    # Frames per second for MP4 (FlashDepth default)
  gif_duration: 110  # Duration per frame in milliseconds for GIF
  save_depth_npy: false  # Save raw depth as .npy files
  save_vis_map: false    # Save colorized depth as .png files
  dummy_timing: false

# Object-wise evaluation configuration
object_wise:
  enabled: false  # Enable object-wise evaluation (set via CLI: object_wise.enabled=true)
  dataset: waymo_seg  # Dataset type for object-wise eval: waymo_seg, sintel
