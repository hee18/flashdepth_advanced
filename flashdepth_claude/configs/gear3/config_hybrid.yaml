# Gear2 Configuration - Hybrid variant (ViT-S student + ViT-L teacher)
# Stage 2: Train on mvs-synth, spring (2K resolution)
# Use for: High-resolution training with teacher-student fusion

# General settings
config_dir: null # overwrite by --config-path
inference: false
load: train_results/results_XX/gear3_s/best.pth  # Gear2-S Stage 1 checkpoint

# Canonical space settings
canonical_focal_length: 1000.0
use_canonical_space: false  # DISABLED - using raw inverse depth without canonicalization

# Dataset configuration
dataset:
  data_root: null # change data path
  resolution: '2k'  # 2K resolution for Stage 2
  video_length: 5
  train_datasets: [mvs-synth, spring]  # Only high-res datasets
  val_datasets: [sintel, waymo]

# Training configuration
training:
  batch_size: 4   # Smaller batch size for 2K resolution
  workers: 8      # Optimized for 96 CPU cores
  iterations: 40001  # Same as Stage 1
  save_freq: 5000
  val_freq: 1000  # Validation every 1k steps
  log_freq: 100
  wandb: false
  wandb_name: "gear3_hybrid_stage2"

  # Learning rates (Gear2 specific)
  gear3_lr: 1.0e-4  # For Gear2 modules (fine-tune)
  mamba_lr: 1.0e-4  # For Mamba (fine-tune)
  final_head_lr: 5.0e-5  # For output_conv1/2 (fine-tune)
  fusion_lr: 1.0e-4  # For hybrid fusion (from scratch)
  weight_decay: 1.0e-6

  # FPS measurement
  measure_fps: true  # Measure forward pass FPS (inference speed)
  fps_log_freq: 100  # Log FPS every N steps

# Model configuration (ViT-S student)
model:
  # ViT configuration
  vit_size: "vits"  # Student uses ViT-S
  patch_size: 14
  attn_class: "MemEffAttention"

  # Mamba configuration
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [1]  # ViT-S uses layer 1 (path_3) for Mamba
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false

# Hybrid model configuration
hybrid_configs:
  use_hybrid: true
  teacher_model_path: train_results/results_XX/gear3_l/best.pth  # Gear2-L Stage 1 checkpoint
  teacher_resolution: 490
  layers_to_skip: [1,2,3]  # Only path_4 is used for fusion
  num_blocks: 4
  mlp_expand: 2
  num_heads: 2

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_gear3_hybrid"
  test_datasets: [sintel]
  test_dataset_resolution: '2k'
  random_input: null
  out_video: true  # Enable video/GIF saving
  out_mp4: false   # false=GIF, true=MP4
  save_res: 518    # Video height for visualization
  video_fps: 24    # Frames per second for MP4 (FlashDepth default)
  gif_duration: 110  # Duration per frame in milliseconds for GIF
  save_depth_npy: false  # Save raw depth as .npy files
  save_vis_map: false    # Save colorized depth as .png files
  dummy_timing: false

# Object-wise evaluation configuration
object_wise:
  enabled: false  # Enable object-wise evaluation (set via CLI: object_wise.enabled=true)
  dataset: waymo  # Dataset type for object-wise eval: waymo, sintel
