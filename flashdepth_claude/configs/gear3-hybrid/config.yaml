# Gear3 Hybrid Configuration - Feature-level Metric Depth Learning with Teacher-Student Fusion
# For 2K resolution processing with FlashDepth Full architecture
# Phase 1: Train on FlashDepth datasets
# Phase 2: Fine-tune on nuScenes

# General settings
config_dir: null # overwrite by --config-path
inference: false
load: null  # path to FlashDepth Full checkpoint (configs/flashdepth/iter_43002.pth)
phase: 1  # Training phase (1 or 2)

# Canonical space settings
canonical_focal_length: 1000.0
use_canonical_space: true

# Dataset configuration
dataset:
  data_root: null # change data path
  resolution: '2k'  # 2K for hybrid model
  video_length: 5

# Training configuration
training:
  batch_size: 4  # Lower batch size for 2K images
  workers: 4
  iterations: 60001  # Same as original FlashDepth
  save_freq: 5000
  val_freq: 1000
  log_freq: 100
  wandb: false
  wandb_name: "gear3_hybrid_phase1"

  # Learning rates (Gear3 Hybrid specific)
  gear3_lr: 1.0e-4  # For new Gear3 modules
  mamba_lr: 1.0e-4  # For Mamba (train from scratch)
  weight_decay: 1.0e-6

# Model configuration (Student: ViT-S)
model:
  # ViT configuration (Student)
  vit_size: "vits"  # Student uses ViT-S for 2K
  patch_size: 14
  attn_class: "MemEffAttention"

  # Mamba configuration
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [1]  # Mamba at DPT layer 1
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false

# Hybrid model configuration (Teacher-Student Fusion)
hybrid_configs:
  use_hybrid: true
  teacher_model_path: null  # Teacher weights loaded from checkpoint
  teacher_resolution: 490  # Teacher processes downsampled 518x518 image
  layers_to_skip: [1,2,3]  # Only path_4 (0th index) is fused
  num_blocks: 4  # Cross-attention blocks
  mlp_expand: 2
  num_heads: 2

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: true
  outfolder: "test_gear3_hybrid"
  test_datasets: [tartanair]
  test_dataset_resolution: '2k'
  random_input: null
  out_video: true
  out_mp4: true
  save_res: 518
  save_depth_npy: true
  save_vis_map: true
  dummy_timing: false
