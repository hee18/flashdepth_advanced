config_dir: null
inference: false
load: null

# Dataset configuration
# Update dataset lists with metric-depth datasets (e.g., kitti, nyuv2)
dataset:
  data_root: null
  resolution: 'base'
  video_length: 5
  train_datasets: [kitti]
  val_datasets: [kitti]

training:
  batch_size: 2
  workers: 4
  gradient_checkpointing: false
  save_freq: 1000
  val_freq: 1000
  vis_freq: 2000
  total_iters: 20000
  gradient_accumulation: 1
  loss_type: "l1"
  wandb: false
  wandb_name: "flashdepth-metric"
  start_with_val: false
  lr:
    vit: 0.0
    fusion: 0.0
    dpt: 0.0
    head: 0.0
    mamba: 0.0
    gsp: 1.0e-3
    warmup_steps: 500

model:
  vit_size: "vitl"
  patch_size: 14
  attn_class: "MemEffAttention"
  use_mamba: true
  mamba_type: "add"
  num_mamba_layers: 4
  downsample_mamba: [0.1]
  mamba_pos_embed: null
  mamba_in_dpt_layer: [3]
  mamba_d_conv: 4
  mamba_d_state: 256
  use_hydra: false
  use_transformer_rnn: false
  use_xlstm: false
  metric_head:
    enable: true
    supervision: metric
    evaluation_target: metric
    layer_index: 23
    hidden_dim: 256
    eps: 1.0e-6

hybrid_configs:
  use_hybrid: false
  teacher_model_path: null
  teacher_resolution: 490
  layers_to_skip: [1,2,3]
  num_blocks: 4
  mlp_expand: 2
  num_heads: 2

# Evaluation configuration
eval:
  compile: false
  metrics: true
  save_grid: false
  outfolder: "metric_eval"
  test_datasets: [kitti]
  test_dataset_resolution: 'base'
  random_input: null
  out_video: true
  out_mp4: true
  save_res: 518
  save_depth_npy: false
  save_vis_map: false
  dummy_timing: false
  large_dir: null
